<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตัวสร้าง String ตารางสอน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
    }

    textarea {
      resize: none;
    }
  </style>
</head>
<body class="bg-green-50 min-h-screen p-4">

  <div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-3xl shadow-xl p-6">

      <h1 class="text-3xl font-bold text-green-700 mb-2 text-center">
        ตัวสร้าง String ตารางสอน
      </h1>

      <p class="text-center text-gray-600 mb-6">
        กรอกข้อมูลในแต่ละช่อง แล้วระบบจะสร้างข้อความแยกตามบรรทัดให้อัตโนมัติ
      </p>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="bg-green-200 text-green-900">
              <th class="border p-2">วัน</th>
              <th class="border p-2">คาบ 1</th>
              <th class="border p-2">คาบ 2</th>
              <th class="border p-2">คาบ 3</th>
              <th class="border p-2">คาบ 4</th>
              <th class="border p-2">คาบ 5</th>
              <th class="border p-2">คาบ 6</th>
              <th class="border p-2">คาบ 7</th>
              <th class="border p-2">คาบ 8</th>
            </tr>
          </thead>

          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="flex flex-wrap gap-3 mt-6 justify-center">
        <button onclick="generateText()"
          class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-2xl font-semibold shadow-lg transition">
          สร้างข้อความ
        </button>

        <button onclick="copyText()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-semibold shadow-lg transition">
          คัดลอกข้อความ
        </button>

        <button onclick="clearAll()"
          class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-2xl font-semibold shadow-lg transition">
          ล้างข้อมูล
        </button>
      </div>

      <div class="mt-8">
        <label class="block mb-2 text-lg font-semibold text-gray-700">
          ผลลัพธ์
        </label>

        <textarea id="output"
          class="w-full h-64 border-2 border-green-300 rounded-2xl p-4 text-sm focus:outline-none focus:ring-4 focus:ring-green-300"
          placeholder="ผลลัพธ์จะแสดงที่นี่..."></textarea>
      </div>

    </div>
  </div>

  <script>
    const days = [
      'วันจันทร์',
      'วันอังคาร',
      'วันพุธ',
      'วันพฤหัสบดี',
      'วันศุกร์'
    ];

    const tableBody = document.getElementById('tableBody');

    // สร้างตาราง
    days.forEach((day, rowIndex) => {
      const tr = document.createElement('tr');

      tr.innerHTML = `
        <td class="border p-2 bg-green-100 font-semibold text-center whitespace-nowrap">
          ${day}
        </td>
        ${Array.from({ length: 8 }, (_, colIndex) => `
          <td class="border p-1">
            <input
              type="text"
              class="w-full border rounded-xl p-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
              placeholder="กรอกข้อมูล"
              data-row="${rowIndex}"
              data-col="${colIndex}"
            />
          </td>
        `).join('')}
      `;

      tableBody.appendChild(tr);
    });

    // สร้างข้อความ
    function generateText() {
      const lines = [];

      for (let row = 0; row < 5; row++) {
        const rowData = [];

        for (let col = 0; col < 8; col++) {
          const input = document.querySelector(
            `input[data-row="${row}"][data-col="${col}"]`
          );

          rowData.push(input.value.trim());
        }

        lines.push(rowData.join(', '));
      }

      document.getElementById('output').value = lines.join('\n');
    }

    // คัดลอกข้อความ
    function copyText() {
      const output = document.getElementById('output');

      output.select();
      document.execCommand('copy');

      alert('คัดลอกข้อความแล้ว');
    }

    // ล้างข้อมูล
    function clearAll() {
      document.querySelectorAll('input').forEach(input => {
        input.value = '';
      });

      document.getElementById('output').value = '';
    }
  </script>

</body>
</html>
